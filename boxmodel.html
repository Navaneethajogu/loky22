<!DOCTYPE html>
<html>
<head>
    <title>CSS Box Model</title>
    <style>
        body {
            background-color: #f0f8ff;
            font-family: Arial, sans-serif;
        }

        .box {
            width: 300px;
            padding: 25px;
            border: 8px solid #ff4500;
            margin: 40px;
            background-color: #87ceeb;
            color: #000;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .content {
            background-color: #ffff99;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="box">
        <div class="content">
            CSS Box Model
        </div>
    </div>

</body>
</html>
