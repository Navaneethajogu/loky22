<!DOCTYPE html>
<html>
<head>
    <title>Flexbox Row and Column</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        h2{
            text-align: center;
        }

        /* Horizontal Flexbox */
        .row-container{
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 50px;
        }

        /* Vertical Flexbox */
        .column-container{
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .box{
            width: 100px;
            height: 100px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box1{ background-color: red; }
        .box2{ background-color: blue; }
        .box3{ background-color: green; }
        .box4{ background-color: orange; }
    </style>
</head>
<body>

    <h2>Horizontal Flexbox (Row)</h2>
    <div class="row-container">
        <div class="box box1">1</div>
        <div class="box box2">2</div>
        <div class="box box3">3</div>
        <div class="box box4">4</div>
    </div>

    <h2>Vertical Flexbox (Column)</h2>
    <div class="column-container">
        <div class="box box1">1</div>
        <div class="box box2">2</div>
        <div class="box box3">3</div>
        <div class="box box4">4</div>
    </div>

</body>
</html>
